<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز التعلم | Центр обучения арабскому языку</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Amiri', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f0f7f0 0%, #e0ebe0 100%);
            min-height: 100vh;
        }
        .islamic-border {
            background: repeating-linear-gradient(90deg, #1a5f3a 0px, #1a5f3a 30px, #c9a84c 30px, #c9a84c 60px);
            height: 8px;
            width: 100%;
        }
        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }
        header {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo h1 { color: #1a5f3a; font-size: 26px; font-family: 'Amiri', serif; }
        .logo h1 span { color: #c9a84c; font-size: 28px; }
        .logo p { color: #555; font-size: 13px; }
        .hadith-header {
            background: #fef9e6;
            padding: 10px 20px;
            border-radius: 40px;
            text-align: center;
            font-family: 'Amiri', serif;
            font-size: 18px;
            color: #1a5f3a;
        }
        .arabic-text { font-family: 'Amiri', 'Traditional Arabic', serif; font-size: 1.3rem; line-height: 1.8; direction: rtl; text-align: right; }
        .lang-switch { display: flex; gap: 10px; }
        .lang-btn, .logout-btn, .btn {
            padding: 8px 20px;
            border: 2px solid #1a5f3a;
            background: white;
            color: #1a5f3a;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .lang-btn.active, .logout-btn:hover, .btn:hover { background: #1a5f3a; color: white; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
            border-bottom: 4px solid #c9a84c;
        }
        .card:hover { transform: translateY(-8px); }
        .card-icon { font-size: 48px; margin-bottom: 15px; }
        .lesson-card, .homework-card, .test-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            transition: 0.2s;
        }
        .lesson-card:hover, .homework-card:hover, .test-card:hover { transform: translateX(8px); border-color: #1a5f3a; }
        .quiz-container, .lessons-container, .profile-container, .admin-panel, .chat-container {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .question { margin-bottom: 25px; padding: 18px; background: #f9fafb; border-radius: 18px; }
        .option { display: flex; align-items: center; gap: 12px; padding: 10px; margin: 8px 0; background: white; border-radius: 50px; cursor: pointer; }
        .option:hover { background: #e8f5e9; }
        .submit-btn { background: linear-gradient(135deg, #1a5f3a, #0d3b23); width: 100%; padding: 14px; border: none; border-radius: 50px; color: white; font-weight: bold; cursor: pointer; }
        .chat-messages { height: 400px; overflow-y: auto; border: 1px solid #ddd; border-radius: 15px; padding: 15px; margin-bottom: 15px; background: #fafafa; }
        .chat-message { padding: 10px; margin-bottom: 10px; border-radius: 15px; background: white; }
        .chat-message .sender { font-weight: bold; color: #1a5f3a; }
        .chat-message .time { font-size: 11px; color: #999; margin-left: 10px; }
        .chat-input { display: flex; gap: 10px; }
        .chat-input input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 30px; }
        .ranking { background: white; border-radius: 20px; padding: 20px; margin-top: 20px; }
        .ranking-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        textarea, input[type="text"], input[type="password"], select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 15px; }
        @media (max-width: 700px) { .container { padding: 12px; } .arabic-text { font-size: 1.1rem; } }
    </style>
</head>
<body>
<div class="islamic-border"></div>
<div class="container" id="app"></div>
<div class="islamic-border"></div>

<script>
    // ==================== TELEGRAM ====================
    const BOT_TOKEN = "8608678770:AAHGYqnZLedOd9U_wK2euMTIO29IeZQVvhs";
    const CHAT_ID = "6714067724";
    async function sendToTelegram(message) {
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: message, parse_mode: 'Markdown' })
            });
        } catch(e) { console.log('Telegram error'); }
    }

    // ==================== ОБЛАЧНОЕ ХРАНИЛИЩЕ (JSONBin.io) ====================
    // Бесплатный JSONBin — общие данные для всех пользователей
    const JSONBIN_BIN_ID = "67b5b5c8acd3cb34a8e0b5f9"; // ← ОБНОВИ, КОГДА СОЗДАШЬ СВОЙ BIN
    const JSONBIN_API_KEY = "$2a$10$eLwNkzqPq3XjY5VZU6yKdO3pQrNcFgHjKlMvBnCxZAsDfGhJkLmNp"; // ← ТВОЙ API КЛЮЧ
    
    // Если хочешь использовать локальное хранилище (пока не настроишь JSONBin) — раскомментируй:
    let USE_LOCAL_FALLBACK = true; // ПОКА ИСПОЛЬЗУЕМ LOCALSTORAGE, ПОТОМ ПЕРЕКЛЮЧИШЬ НА JSONBIN
    
    let sharedData = {
        tests: [],
        lessons: [],
        homeworks: [],
        chatMessages: [],
        questionsToTeacher: [],
        quizResults: {},
        lastUpdate: Date.now()
    };
    
    async function loadSharedData() {
        if (!USE_LOCAL_FALLBACK) {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                const data = await res.json();
                if (data.record) sharedData = data.record;
            } catch(e) { console.log('JSONBin error, using localStorage'); loadFromLocal(); }
        } else {
            loadFromLocal();
        }
        ensureDefaultData();
    }
    
    function loadFromLocal() {
        sharedData.tests = JSON.parse(localStorage.getItem('shared_tests')) || [];
        sharedData.lessons = JSON.parse(localStorage.getItem('shared_lessons')) || [];
        sharedData.homeworks = JSON.parse(localStorage.getItem('shared_homeworks')) || [];
        sharedData.chatMessages = JSON.parse(localStorage.getItem('shared_chatMessages')) || [];
        sharedData.questionsToTeacher = JSON.parse(localStorage.getItem('shared_questionsToTeacher')) || [];
        sharedData.quizResults = JSON.parse(localStorage.getItem('shared_quizResults')) || {};
    }
    
    function saveSharedData() {
        localStorage.setItem('shared_tests', JSON.stringify(sharedData.tests));
        localStorage.setItem('shared_lessons', JSON.stringify(sharedData.lessons));
        localStorage.setItem('shared_homeworks', JSON.stringify(sharedData.homeworks));
        localStorage.setItem('shared_chatMessages', JSON.stringify(sharedData.chatMessages));
        localStorage.setItem('shared_questionsToTeacher', JSON.stringify(sharedData.questionsToTeacher));
        localStorage.setItem('shared_quizResults', JSON.stringify(sharedData.quizResults));
        if (!USE_LOCAL_FALLBACK) {
            fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
                body: JSON.stringify(sharedData)
            }).catch(e => console.log);
        }
        triggerRefresh();
    }
    
    function ensureDefaultData() {
        if (sharedData.tests.length === 0) {
            sharedData.tests = [
                { id: 1, title_ru: "Основы арабского языка", title_ar: "أساسيات اللغة العربية", 
                  questions: [
                      { text_ru: "Как будет 'Привет' на арабском?", text_ar: "كيف نقول 'مرحبًا'؟", type: "three", options: ["السلام عليكم", "مرحبًا", "أهلاً"], correct: 1 },
                      { text_ru: "Арабский язык пишется справа налево?", text_ar: "اللغة العربية تُكتب من اليمين إلى اليسار؟", type: "two", options: ["Да", "Нет"], correct: 0 },
                      { text_ru: "Коран написан на арабском языке", text_ar: "القرآن مكتوب بالعربية", type: "bool", correct: true }
                  ]}
            ];
        }
        if (sharedData.lessons.length === 0) {
            sharedData.lessons = [
                { id: 1, title_ru: "Урок 1: Арабский алфавит", title_ar: "الدرس الأول: الحروف العربية", 
                  content_ru: "В арабском языке 28 букв. Они пишутся справа налево. Каждая буква имеет 4 формы.",
                  content_ar: "اللغة العربية تحتوي على 28 حرفًا. تُكتب من اليمين إلى اليسار. كل حرف له 4 أشكال." },
                { id: 2, title_ru: "Урок 2: Хадис о знании", title_ar: "الدرس الثاني: حديث طلب العلم فريضة",
                  content_ru: "Пророк ﷺ сказал: «طلب العلم فريضة على كل مسلم» — «Поиск знания — обязанность каждого мусульманина».",
                  content_ar: "قال النبي ﷺ: «طلب العلم فريضة على كل مسلم»" }
            ];
        }
        if (sharedData.homeworks.length === 0) {
            sharedData.homeworks = [
                { id: 1, title_ru: "Выучить буквы أ-خ", title_ar: "حفظ الحروف أ-خ", deadline: "2025-06-20", content_ru: "Выучить написание и произношение букв: أ, ب, ت, ث, ج, ح, خ." },
                { id: 2, title_ru: "Прочитать историю про Ахмеда", title_ar: "قراءة قصة أحمد", deadline: "2025-06-25", content_ru: "Прочитать и перевести текст про Ахмеда." }
            ];
        }
        saveSharedData();
    }
    
    // ==================== ПОЛЬЗОВАТЕЛИ ====================
    let users = JSON.parse(localStorage.getItem('users')) || {
        'Гиясиддин': { password: '02040627', role: 'student', name: 'Гиясиддин', gameScore: 0, profile: {} },
        'Хисрав': { password: '03256405', role: 'student', name: 'Хисрав', gameScore: 0, profile: {} },
        'Ахмад': { password: '020425', role: 'student', name: 'Ахмад', gameScore: 0, profile: {} },
        'Шерзод': { password: '020825', role: 'student', name: 'Шерзод', gameScore: 0, profile: {} },
        'Шахром': { password: '565645', role: 'student', name: 'Шахром', gameScore: 0, profile: {} }
    };
    const TEACHER = { login: 'учитель', password: 'teacher2024', role: 'teacher', name: 'Учитель' };
    
    let currentUser = null;
    let currentLanguage = 'ru';
    let currentSection = 'dashboard';
    let currentTest = null;
    let quizAnswers = [];
    let refreshInterval = null;
    
    function t(ru, ar) { return currentLanguage === 'ru' ? ru : ar; }
    
    function triggerRefresh() {
        if (window.refreshUI) window.refreshUI();
    }
    
    async function refreshAllData() {
        await loadSharedData();
        if (window.updateUIFromData) window.updateUIFromData();
    }
    
    // ==================== ВХОД ====================
    function renderLoginPage() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div style="max-width: 450px; margin: 50px auto; background: white; border-radius: 25px; padding: 40px; text-align: center;">
                <div class="hadith-header" style="margin-bottom: 20px;">طلب العلم فريضة على كل مسلم</div>
                <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
                    <button class="lang-btn ${currentLanguage === 'ru' ? 'active' : ''}" onclick="setLanguage('ru')">Русский</button>
                    <button class="lang-btn ${currentLanguage === 'ar' ? 'active' : ''}" onclick="setLanguage('ar')">العربية</button>
                </div>
                <h2 style="color:#1a5f3a;">📚 ${t('Центр обучения арабскому', 'مركز تعليم اللغة العربية')}</h2>
                <select id="userSelect" style="width:100%; padding:15px; margin:15px 0; border-radius:15px;">
                    <option value="">${t('Выберите пользователя', 'اختر المستخدم')}</option>
                    <option value="Гиясиддин">Гиясиддин</option><option value="Хисрав">Хисрав</option>
                    <option value="Ахмад">Ахмад</option><option value="Шерзод">Шерзод</option>
                    <option value="Шахром">Шахром</option>
                    <option value="учитель">${t('Учитель', 'المعلم')}</option>
                </select>
                <input type="password" id="passwordInput" placeholder="${t('Пароль', 'كلمة المرور')}" style="width:100%; padding:15px; border-radius:15px;">
                <button onclick="login()" style="width:100%; padding:15px; background:#1a5f3a; color:white; border:none; border-radius:30px; margin-top:20px;">🔑 ${t('Войти', 'دخول')}</button>
            </div>
        `;
    }
    
    window.login = async function() {
        const username = document.getElementById('userSelect').value;
        const password = document.getElementById('passwordInput').value;
        if (!username) return alert(t('Выберите пользователя', 'اختر المستخدم'));
        if (username === 'учитель') {
            if (password === TEACHER.password) { currentUser = TEACHER; await refreshAllData(); renderMain(); }
            else alert(t('Неверный пароль', 'كلمة مرور غير صحيحة'));
        } else if (users[username] && users[username].password === password) {
            currentUser = users[username]; currentUser.name = username; await refreshAllData(); renderMain();
        } else alert(t('Неверный пароль', 'كلمة مرور غير صحيحة'));
    };
    
    window.setLanguage = function(lang) { currentLanguage = lang; renderMain(); };
    window.logout = function() { currentUser = null; if (refreshInterval) clearInterval(refreshInterval); renderLoginPage(); };
    
    function renderMain() { if (currentUser?.role === 'teacher') renderTeacherDashboard(); else renderStudentDashboard(); }
    window.updateUIFromData = renderMain;
    
    // ==================== СТУДЕНТ ====================
    function renderStudentDashboard() {
        const app = document.getElementById('app');
        const studentResults = sharedData.quizResults[currentUser.name] || { completedTests: {}, hwCompleted: {} };
        const completedCount = Object.keys(studentResults.completedTests || {}).length;
        app.innerHTML = `
            <header>
                <div><div class="logo"><h1>📖 ${t('مركز تعليم العربية', 'Центр арабского языка')} <span>${t('Аль-Ильм', 'العلم')}</span></h1><p>${t('Добро пожаловать,', 'مرحبًا،')} ${currentUser.name}</p></div></div>
                <div class="lang-switch">
                    <button class="lang-btn ${currentLanguage === 'ru' ? 'active' : ''}" onclick="setLanguage('ru')">Русский</button>
                    <button class="lang-btn ${currentLanguage === 'ar' ? 'active' : ''}" onclick="setLanguage('ar')">العربية</button>
                    <button class="logout-btn" onclick="logout()">🚪 ${t('Выйти', 'خروج')}</button>
                </div>
            </header>
            <div class="hadith-header">طلب العلم فريضة على كل مسلم</div>
            <div class="stats" style="display:flex; gap:20px; margin:20px 0; justify-content:center;">
                <div class="stat-card" style="background:white; padding:15px; border-radius:20px;"><div class="number" style="font-size:32px; color:#1a5f3a;">${completedCount}</div><div>${t('Тестов пройдено', 'تم اجتياز الاختبارات')}</div></div>
                <div class="stat-card" style="background:white; padding:15px; border-radius:20px;"><div class="number" style="font-size:32px; color:#1a5f3a;">${users[currentUser.name]?.gameScore || 0}</div><div>${t('Очки', 'نقاط')}</div></div>
            </div>
            <div class="dashboard">
                <div class="card" onclick="showTestsList()"><div class="card-icon">📝</div><h3>${t('Тестирование', 'الاختبار')}</h3><p>${t('Проверь знания', 'اختبر معلوماتك')}</p></div>
                <div class="card" onclick="showLessonsList()"><div class="card-icon">📖</div><h3>${t('Уроки', 'الدروس')}</h3><p>${t('Изучай арабский', 'تعلم العربية')}</p></div>
                <div class="card" onclick="showHomeworksList()"><div class="card-icon">✏️</div><h3>${t('Домашние задания', 'الواجبات')}</h3></div>
                <div class="card" onclick="showChat()"><div class="card-icon">💬</div><h3>${t('Общий чат', 'الدردشة')}</h3></div>
                <div class="card" onclick="showProfile()"><div class="card-icon">👤</div><h3>${t('Мой профиль', 'ملفي')}</h3></div>
                <div class="card" onclick="showGame()"><div class="card-icon">🐉</div><h3>${t('Игра', 'لعبة')}</h3></div>
                <div class="card" onclick="showAskTeacher()"><div class="card-icon">❓</div><h3>${t('Вопрос учителю', 'سؤال للمعلم')}</h3></div>
            </div>
            <div id="contentSection"></div>
        `;
    }
    
    window.showTestsList = function() {
        const container = document.getElementById('contentSection');
        let html = `<div class="quiz-container"><h2>${t('📚 Доступные тесты', 'الاختبارات المتاحة')}</h2>`;
        sharedData.tests.forEach(test => {
            const completed = sharedData.quizResults[currentUser.name]?.completedTests?.[test.id];
            html += `<div class="test-card"><h3>${t(test.title_ru, test.title_ar)}</h3><p>${t('Вопросов:', 'عدد الأسئلة:')} ${test.questions.length}</p>
                ${completed ? `<p style="color:green;">✅ ${t('Пройден', 'مكتمل')} - ${completed.score}/${completed.total}</p>
                <button class="btn" onclick="startTest(${test.id})">${t('Пройти заново', 'إعادة الاختبار')}</button>` : 
                `<button class="btn" onclick="startTest(${test.id})">${t('Начать тест', 'ابدأ الاختبار')}</button>`}
            </div>`;
        });
        html += `<button class="btn" onclick="renderStudentDashboard()" style="margin-top:20px;">◀ ${t('Назад', 'العودة')}</button></div>`;
        container.innerHTML = html;
    };
    
    window.startTest = function(testId) {
        currentTest = sharedData.tests.find(t => t.id === testId);
        quizAnswers = new Array(currentTest.questions.length).fill(null);
        renderQuiz();
    };
    
    function renderQuiz() {
        const container = document.getElementById('contentSection');
        let html = `<div class="quiz-container"><h2>${t(currentTest.title_ru, currentTest.title_ar)}</h2>`;
        currentTest.questions.forEach((q, idx) => {
            html += `<div class="question"><div class="question-text">${idx+1}. ${t(q.text_ru, q.text_ar)}</div><div class="options">`;
            if (q.type === 'three' || q.type === 'two') {
                q.options.forEach((opt, optIdx) => {
                    html += `<label class="option"><input type="radio" name="q${idx}" value="${optIdx}" ${quizAnswers[idx] === optIdx ? 'checked' : ''} onchange="saveAnswer(${idx}, ${optIdx})"> ${t(opt, opt)}</label>`;
                });
            } else if (q.type === 'bool') {
                html += `<label class="option"><input type="radio" name="q${idx}" value="true" ${quizAnswers[idx] === true ? 'checked' : ''} onchange="saveAnswer(${idx}, true)"> ✅ ${t('Правильно', 'صحيح')}</label>
                        <label class="option"><input type="radio" name="q${idx}" value="false" ${quizAnswers[idx] === false ? 'checked' : ''} onchange="saveAnswer(${idx}, false)"> ❌ ${t('Неправильно', 'خطأ')}</label>`;
            }
            html += `</div></div>`;
        });
        html += `<button class="submit-btn" onclick="submitTest(${currentTest.id})">✅ ${t('Завершить тест', 'إنهاء الاختبار')}</button>
                <button class="btn" onclick="renderStudentDashboard()" style="margin-top:10px;">❌ ${t('Отмена', 'إلغاء')}</button></div>`;
        container.innerHTML = html;
    }
    
    window.saveAnswer = function(qIdx, val) { quizAnswers[qIdx] = val; };
    
    window.submitTest = async function(testId) {
        let score = 0;
        currentTest.questions.forEach((q, idx) => { if (quizAnswers[idx] !== null && quizAnswers[idx] === q.correct) score++; });
        if (!sharedData.quizResults[currentUser.name]) sharedData.quizResults[currentUser.name] = { completedTests: {}, hwCompleted: {} };
        sharedData.quizResults[currentUser.name].completedTests[testId] = { score, total: currentTest.questions.length };
        saveSharedData();
        sendToTelegram(`📊 *РЕЗУЛЬТАТ ТЕСТА*\n👨‍🎓 ${currentUser.name}\n📝 ${currentTest.title_ru}\n✅ ${score}/${currentTest.questions.length}`);
        alert(`${t('Тест завершен!', 'انتهى الاختبار!')}\n${t('Результат:', 'النتيجة:')} ${score}/${currentTest.questions.length}`);
        renderStudentDashboard();
    };
    
    window.showLessonsList = function() {
        const container = document.getElementById('contentSection');
        let html = `<div class="lessons-container"><h2>📖 ${t('Уроки', 'الدروس')}</h2>`;
        sharedData.lessons.forEach(lesson => {
            html += `<div class="lesson-card" onclick="showLessonDetail(${lesson.id})"><h3>${t(lesson.title_ru, lesson.title_ar)}</h3><p>${t(lesson.content_ru.substring(0, 100), lesson.content_ar.substring(0, 100))}...</p></div>`;
        });
        html += `<button class="btn" onclick="renderStudentDashboard()">◀ ${t('Назад', 'العودة')}</button></div>`;
        container.innerHTML = html;
    };
    
    window.showLessonDetail = function(lessonId) {
        const lesson = sharedData.lessons.find(l => l.id === lessonId);
        const container = document.getElementById('contentSection');

    window.showGame = function() { renderGame(); };
    const arabicNumbers = [{n:1,a:"وَاحِد"},{n:2,a:"اِثْنَان"},{n:3,a:"ثَلَاثَة"},{n:4,a:"أَرْبَعَة"},{n:5,a:"خَمْسَة"},{n:6,a:"سِتَّة"},{n:7,a:"سَبْعَة"},{n:8,a:"ثَمَانِيَة"},{n:9,a:"تِسْعَة"},{n:10,a:"عَشَرَة"}];
    let gameIndex = 0, gameScoreLocal = 0, gameQuestions = [];
    function renderGame() {
        if (gameQuestions.length === 0) {
            gameQuestions = [...arabicNumbers];
            gameIndex = 0; gameScoreLocal = users[currentUser.name]?.gameScore || 0;
        }
        if (gameIndex >= gameQuestions.length) {
            users[currentUser.name].gameScore = gameScoreLocal;
            localStorage.setItem('users', JSON.stringify(users));
            sendToTelegram(`🎮 *ИГРА*: ${currentUser.name} набрал ${gameScoreLocal} очков!`);
            alert(`🎉 ${t('Игра окончена!', 'انتهت اللعبة!')}\n${t('Твои очки:', 'نقاطك:')} ${gameScoreLocal}`);
            gameQuestions = []; renderStudentDashboard(); return;
        }
        const q = gameQuestions[gameIndex];
        const wrongs = arabicNumbers.filter(w => w.n !== q.n).map(w => w.a).sort(() => Math.random() - 0.5).slice(0, 3);
        const options = [q.a, ...wrongs].sort(() => Math.random() - 0.5);
        const container = document.getElementById('contentSection');
        container.innerHTML = `<div class="quiz-container"><div class="game-area" style="text-align:center;"><div style="font-size:80px;">🐉</div><div class="question-number" style="font-size:50px;">${t('Цифра', 'الرقم')}: ${q.n}</div>
            <div class="game-options">${options.map(opt => `<button class="option" onclick="checkGameAnswer(${q.n}, '${opt}')">${opt}</button>`).join('')}</div>
            <div class="score-board">⭐ ${t('Счёт', 'النتيجة')}: ${gameScoreLocal}</div>
            <button class="btn" onclick="renderStudentDashboard()">◀ ${t('Выйти', 'خروج')}</button></div></div>`;
    }
    window.checkGameAnswer = function(num, selected) {
        const correct = arabicNumbers.find(n => n.n === num).a;
        if (selected === correct) { gameScoreLocal += 10; alert('✅ +10'); }
        else { gameScoreLocal = Math.max(0, gameScoreLocal - 5); alert(`❌ -5. Правильно: ${correct}`); }
        gameIndex++;
        renderGame();
    };

    };
    
    function renderOpts(q, idx) {
        if (q.type === 'bool') return `<label><input type="radio" name="correct_${idx}" value="true" ${q.correct===true?'checked':''}> Правильно</label><label><input type="radio" name="correct_${idx}" value="false" ${q.correct===false?'checked':''}> Неправильно</label>`;
        let html = '';
        (q.options || ['','','']).forEach((opt, oi) => {
            html += `<input type="text" id="opt_${idx}_${oi}" value="${opt}" placeholder="Вариант ${oi+1}" style="width:70%;"><input type="radio" name="correct_${idx}" value="${oi}" ${q.correct===oi?'checked':''}> ✅<br>`;

    window.addQuestion = function(testId) {
        const test = sharedData.tests.find(t => t.id === testId);

    window.removeQuestion = function(testId, qIdx) { sharedData.tests.find(t => t.id === testId).questions.splice(qIdx,1); saveSharedData(); editTest(testId); };
    window.saveTest = function(testId) {
        const test = sharedData.tests.find(t => t.id === testId);
        test.title_ru = document.getElementById('test_title_ru').value;
        test.title_ar = document.getElementById('test_title_ar').value;
        for (let i=0; i<test.questions.length; i++) {
            test.questions[i].text_ru = document.getElementById(`q_text_ru_${i}`)?.value || test.questions[i].text_ru;
            test.questions[i].text_ar = document.getElementById(`q_text_ar_${i}`)?.value || test.questions[i].text_ar;
            test.questions[i].type = document.getElementById(`q_type_${i}`)?.value || test.questions[i].type;
            const radio = document.querySelector(`input[name="correct_${i}"]:checked`);
            if (radio) test.questions[i].correct = test.questions[i].type === 'bool' ? radio.value === 'true' : parseInt(radio.value);
            if (test.questions[i].type !== 'bool') {
                test.questions[i].options = [];
                for (let j=0; j<5; j++) {
                    let opt = document.getElementById(`opt_${i}_${j}`);
                    if (opt && opt.value) test.questions[i].options.push(opt.value);
                }
            }
        }
        saveSharedData();
        alert(t('Сохранено!', 'تم الحفظ!'));
        manageTests();
    };

        Object.keys(users).forEach(name => {

            html += `<tr><td>${name}</td><td>${Object.keys(res.completedTests || {}).length}/${sharedData.tests.length}</td><td>${Object.keys(res.hwCompleted || {}).length}/${sharedData.homeworks.length}</td><td>${users[name].gameScore || 0}</td></tr>`;
        });
        html += `</tbody>}有不少<button class="btn" onclick="renderTeacherDashboard()">◀ ${t('Назад', 'العودة')}</button></div>`;
        container.innerHTML = html;
    };
    
    window.showChatTeacher = function() { renderChat(); };
    
    loadSharedData().then(() => renderLoginPage());
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(() => { if (currentUser) refreshAllData(); }, 5000);
</script>
</body>
</html>
